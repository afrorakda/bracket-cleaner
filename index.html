<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Bracket Cleaner - Fridge Combo</title>
    
    <link rel="icon" href="image_43.png">
    <link rel="apple-touch-icon" href="image_43.png">

    <style>
        :root {
            --bg: #fff;
            --main: #333;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header { text-align: left; padding: 0 10px; }
        h1 { font-size: 26px; margin: 0; font-weight: 800; letter-spacing: -1px; }
        .description { font-size: 13px; opacity: 0.6; margin-top: 5px; font-weight: 500; }

        /* Mode Selector */
        .mode-selector {
            display: flex;
            background: var(--input-bg);
            padding: 5px;
            border-radius: var(--radius);
            border: 1px solid var(--accent);
            gap: 5px;
        }
        .mode-btn {
            flex: 1;
            padding: 12px;
            font-size: 12px;
            font-weight: 800;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: var(--main);
            cursor: pointer;
            transition: 0.2s;
        }
        .mode-btn.active {
            background: var(--main);
            color: #fff;
        }

        /* Input Area */
        .input-wrapper {
            width: 100%;
            position: relative;
        }
        textarea {
            width: 100%;
            height: 300px;
            padding: 15px;
            border: 2px solid var(--accent);
            border-radius: var(--radius);
            background-color: var(--input-bg);
            font-size: 16px;
            color: var(--main);
            outline: none;
            resize: none;
            /* iOS Style Fix */
            -webkit-appearance: none;
            -webkit-text-fill-color: var(--main);
            opacity: 1 !important;
        }

        .clr-btn {
            position: absolute;
            right: 15px;
            bottom: 15px;
            font-size: 12px;
            font-weight: 800;
            color: var(--main);
            cursor: pointer;
            opacity: 0.4;
            padding: 10px;
        }

        /* Action Buttons */
        .action-btn {
            width: 100%;
            padding: 20px;
            background-color: var(--main);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.2s;
        }
        .action-btn:active { transform: scale(0.98); opacity: 0.9; }

        .result-area {
            display: none;
            background: var(--input-bg);
            border-radius: var(--radius);
            padding: 15px;
            border: 1px solid var(--accent);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .stat-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 8px;
            font-weight: 700;
            opacity: 0.5;
        }

        .copy-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--main);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
        }

        /* Add to Home Modal */
        #ath-modal {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: var(--main);
            color: #fff;
            padding: 20px;
            border-radius: var(--radius);
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .ath-content { display: flex; align-items: center; gap: 15px; }
        .ath-icon { width: 50px; height: 50px; border-radius: 12px; background: #fff; }
        .ath-text { flex: 1; font-size: 13px; font-weight: 600; line-height: 1.4; }
        .ath-close { font-size: 20px; opacity: 0.5; cursor: pointer; padding-left: 10px; }

        /* Footer */
        footer {
            margin-top: auto;
            padding: 40px 0 20px;
            text-align: center;
        }
        .kofi-btn {
            display: inline-block;
            background: var(--main);
            color: #fff;
            padding: 12px 24px;
            border-radius: var(--radius);
            text-decoration: none;
            font-weight: 800;
            font-size: 13px;
            margin-bottom: 25px;
        }
        .footer-line {
            font-size: 11px;
            line-height: 1.8;
            color: #aaa;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Bracket Cleaner</h1>
        <p class="description">Remove brackets or their content instantly.</p>
    </header>

    <div class="mode-selector">
        <button id="btn-content" class="mode-btn active">Delete Content</button>
        <button id="btn-bracket" class="mode-btn">Brackets Only</button>
    </div>

    <div class="input-wrapper">
        <textarea id="input-text" placeholder="Paste text here..."></textarea>
        <div class="clr-btn" id="btn-clr">CLR</div>
    </div>

    <button id="btn-main" class="action-btn">CLEAN TEXT</button>

    <div id="result-box" class="result-area">
        <div id="stats"></div>
        <button id="btn-copy" class="copy-btn">COPY RESULT</button>
    </div>
</div>

<div id="ath-modal">
    <div class="ath-content">
        <img src="image_43.png" class="ath-icon" alt="icon">
        <div class="ath-text">Tap the share button and select "Add to Home Screen" for quick access.</div>
        <div class="ath-close" id="ath-close">×</div>
    </div>
</div>

<footer>
    <a href="https://ko-fi.com/afrorakda" target="_blank" rel="noopener" class="kofi-btn">☕️buy me a coffee</a>
    <div class="footer-line">
        No login / No tracking / No ads / Browser only<br>
        Privacy Policy<br>
        afrorakda © 2026
    </div>
</footer>

<script>
    const input = document.getElementById('input-text');
    const btnMain = document.getElementById('btn-main');
    const resultBox = document.getElementById('result-box');
    const stats = document.getElementById('stats');
    const btnCopy = document.getElementById('btn-copy');
    const athModal = document.getElementById('ath-modal');
    let mode = 'content';

    // Mode Toggle
    document.getElementById('btn-content').onclick = (e) => {
        mode = 'content';
        e.target.classList.add('active');
        document.getElementById('btn-bracket').classList.remove('active');
    };
    document.getElementById('btn-bracket').onclick = (e) => {
        mode = 'bracket';
        e.target.classList.add('active');
        document.getElementById('btn-content').classList.remove('active');
    };

    // Clear
    document.getElementById('btn-clr').onclick = () => {
        input.value = '';
        resultBox.style.display = 'none';
        input.focus();
    };

    // Core Logic
    btnMain.onclick = () => {
        const original = input.value;
        if(!original) return;

        const pairs = [
            ['\\(', '\\)'], ['（', '）'], ['\\[', '\\]'], ['［', '］'],
            ['\\{', '\\}'], ['｛', '｝'], ['「', '」'], ['『', '』'],
            ['<', '>'], ['〈', '〉'], ['《', '》'], ['＜', '＞'], ['【', '】'], ['〔', '〕']
        ];

        let result = original;
        if (mode === 'content') {
            pairs.forEach(p => {
                const re = new RegExp(p[0] + '.*?' + p[1], 'g');
                result = result.replace(re, '');
            });
        } else {
            pairs.forEach(p => {
                const reOpen = new RegExp(p[0], 'g');
                const reClose = new RegExp(p[1], 'g');
                result = result.replace(reOpen, '').replace(reClose, '');
            });
        }

        input.value = result;
        stats.innerHTML = `
            <div class="stat-row"><span>Characters</span><span>${original.length} → ${result.length}</span></div>
        `;
        resultBox.style.display = 'block';
    };

    // Copy
    btnCopy.onclick = () => {
        navigator.clipboard.writeText(input.value);
        const oldText = btnCopy.innerText;
        btnCopy.innerText = '✅ COPIED';
        setTimeout(() => btnCopy.innerText = oldText, 2000);
    };

    // Add to Home Screen Logic (iOS)
    const isIos = /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
    const isStandalone = window.navigator.standalone === true;
    if (isIos && !isStandalone) {
        athModal.style.display = 'block';
    }
    document.getElementById('ath-close').onclick = () => athModal.style.display = 'none';
</script>

</body>
</html>
