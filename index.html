<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bracket Cleaner</title>
    
    <link rel="icon" href="image_43.png">
    <link rel="apple-touch-icon" href="image_43.png">

    <style>
        :root {
            --main: #333;
            --bg: #fff;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
        }

        /* 憲法遵守: 角丸15px / iOS Safari対策 */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
        textarea { -webkit-user-select: text; user-select: text; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
            padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px) 20px;
        }

        .container {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -1.2px; }

        .hub-link {
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 800;
            color: var(--main);
            background: var(--accent);
            padding: 8px 14px;
            border-radius: var(--radius);
        }

        .subtitle { font-size: 0.9rem; color: #666; font-weight: 700; text-align: left; }

        /* Mode Selector */
        .mode-selector {
            display: flex;
            background: var(--input-bg);
            padding: 5px;
            border-radius: var(--radius);
            border: 2px solid var(--accent);
            gap: 5px;
        }
        .mode-btn {
            flex: 1;
            padding: 12px;
            font-size: 0.75rem;
            font-weight: 800;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: #888;
            cursor: pointer;
        }
        .mode-btn.active {
            background: #fff;
            color: var(--main);
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .input-card {
            background: var(--input-bg);
            padding: 18px;
            border-radius: var(--radius);
            border: 2px solid var(--accent);
            position: relative;
        }

        .input-wrapper { position: relative; }

        textarea {
            width: 100%;
            height: 260px;
            padding: 15px;
            padding-right: 45px;
            border: 2px solid var(--accent);
            border-radius: var(--radius);
            background-color: #fff;
            font-size: 1rem;
            font-weight: 600;
            color: var(--main) !important;
            outline: none;
            resize: none;
            -webkit-appearance: none;
            -webkit-text-fill-color: var(--main) !important;
            opacity: 1 !important;
        }
        textarea::placeholder { color: #bbb !important; -webkit-text-fill-color: #bbb !important; opacity: 1 !important; }

        .clr-btn {
            position: absolute; top: 10px; right: 10px; width: 28px; height: 28px;
            background: #ccc; color: #fff; border-radius: 50%;
            display: none; align-items: center; justify-content: center;
            cursor: pointer; border: none; font-size: 16px; font-weight: bold; z-index: 5;
        }

        .action-area { display: flex; flex-direction: column; gap: 10px; }

        .btn-main {
            width: 100%;
            padding: 18px;
            background-color: var(--main);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            -webkit-text-fill-color: #fff;
        }
        
        /* 枠線を強調したコピーボタン */
        .btn-copy {
            width: 100%;
            padding: 16px;
            background-color: var(--accent);
            color: var(--main);
            border: 2px solid var(--main); /* 枠線強調 */
            border-radius: var(--radius);
            font-size: 0.9rem;
            font-weight: 800;
            cursor: pointer;
            display: none;
        }
        .btn-main:active, .btn-copy:active { transform: scale(0.98); }

        .footer-btns { display: flex; flex-direction: column; gap: 10px; margin-top: 5px; }
        .kofi-btn {
            background: var(--main); color: #fff; text-decoration: none;
            padding: 16px; border-radius: var(--radius); text-align: center;
            font-weight: 900; font-size: 0.9rem; -webkit-text-fill-color: #fff;
        }
        .home-btn {
            background: var(--accent); color: var(--main); border: none;
            padding: 12px; border-radius: var(--radius); font-weight: 800; font-size: 0.8rem; cursor: pointer;
        }

        /* 鉄壁フッター */
        footer { text-align: center; font-size: 0.75rem; color: #999; line-height: 1.6; font-weight: 700; margin-top: 15px; }
        footer a { color: inherit; text-decoration: underline; }

        #modal {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px);
        }
        .modal-content {
            background: #fff; width: 90%; max-width: 340px; padding: 35px;
            border-radius: var(--radius); text-align: left; position: relative;
        }
        .close-x { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #ccc; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Bracket Cleaner</h1>
        <a href="https://afrorakda.github.io/" class="hub-link">🏠 Hub</a>
    </header>
    <p class="subtitle">Remove brackets or content instantly.</p>

    <div class="mode-selector">
        <button id="btn-content" class="mode-btn active" onclick="setMode('content')">Brackets + Content</button>
        <button id="btn-bracket" class="mode-btn" onclick="setMode('bracket')">Brackets Only</button>
    </div>

    <div class="input-card">
        <div class="input-wrapper">
            <textarea id="text-input" placeholder="Paste your text here..." oninput="toggleClr()"></textarea>
            <button class="clr-btn" id="clrBtn" onclick="clearInput()">×</button>
        </div>
    </div>

    <div class="action-area">
        <button id="btn-run" class="btn-main" onclick="cleanText()">CLEAN TEXT</button>
        <button id="btn-copy" class="btn-copy" onclick="copyResult()">COPY CLEANED TEXT</button>
    </div>

    <div class="footer-btns">
        <a id="kofi-link" href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">☕️ buy me a coffee</a>
        <button class="home-btn" onclick="showModal()">Add to Home Screen</button>
    </div>

    <footer>
        <span id="footer-text">No login / No tracking / No ads / Browser only</span><br>
        <a id="privacy-link" href="https://afrorakda.com/privacy/">Privacy Policy</a> / <span id="copyright">afrorakda © 2026</span>
    </footer>
</div>

<div id="modal" onclick="hideModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-x" onclick="hideModal()">×</span>
        <h3 id="modal-title" style="margin-bottom: 15px; font-weight: 900;">📱 Install</h3>
        <p id="modal-body" style="font-size: 0.9rem; line-height: 1.6; font-weight: 700;">
            🍏 <strong>iPhone:</strong><br>Share > Add to Home Screen<br><br>
            🤖 <strong>Android:</strong><br>Menu (⋮) > Add to Home Screen
        </p>
    </div>
</div>

<script>
    const input = document.getElementById('text-input');
    const clrBtn = document.getElementById('clrBtn');
    const btnRun = document.getElementById('btn-run');
    const btnCopy = document.getElementById('btn-copy');
    let currentMode = localStorage.getItem('bracketCleanerMode') || 'content';

    // 初期モードの反映
    function init() {
        setMode(currentMode);
        loadFooter();
    }

    function setMode(mode) {
        currentMode = mode;
        localStorage.setItem('bracketCleanerMode', mode); // モード保存
        document.getElementById('btn-content').classList.toggle('active', mode === 'content');
        document.getElementById('btn-bracket').classList.toggle('active', mode === 'bracket');
    }

    function toggleClr() {
        clrBtn.style.display = input.value.length > 0 ? 'flex' : 'none';
        if(input.value.length === 0) btnCopy.style.display = 'none';
    }

    function clearInput() {
        input.value = '';
        toggleClr();
        input.focus();
    }

    function cleanText() {
        const original = input.value;
        if (!original) return;

        const pairs = [
            ['\\(', '\\)'], ['（', '）'], ['\\[', '\\]'], ['［', '］'],
            ['\\{', '\\}'], ['｛', '｝'], ['「', '」'], ['『', '』'],
            ['<', '>'], ['〈', '〉'], ['《', '》'], ['＜', '＞'], ['【', '】'], ['〔', '〕']
        ];

        let result = original;
        if (currentMode === 'content') {
            pairs.forEach(p => {
                const re = new RegExp(p[0] + '.*?' + p[1], 'g');
                let prev;
                do {
                    prev = result;
                    result = result.replace(re, '');
                } while (result !== prev);
            });
        } else {
            pairs.forEach(p => {
                const reOpen = new RegExp(p[0], 'g');
                const reClose = new RegExp(p[1], 'g');
                result = result.replace(reOpen, '').replace(reClose, '');
            });
        }

        input.value = result;
        btnCopy.style.display = 'block';
    }

    function copyResult() {
        if (!input.value) return;
        navigator.clipboard.writeText(input.value).then(() => {
            const oldText = btnCopy.innerText;
            btnCopy.innerText = '✅ COPIED!';
            btnCopy.style.backgroundColor = '#333';
            btnCopy.style.color = '#fff';
            setTimeout(() => {
                btnCopy.innerText = oldText;
                btnCopy.style.backgroundColor = 'var(--accent)';
                btnCopy.style.color = 'var(--main)';
            }, 1500);
        });
    }

    function showModal() { document.getElementById('modal').style.display = 'flex'; }
    function hideModal() { document.getElementById('modal').style.display = 'none'; }

    async function loadFooter() {
        try {
            const response = await fetch('footer.json');
            if (response.ok) {
                const data = await response.json();
                if (data.footerText) document.getElementById('footer-text').innerText = data.footerText;
                if (data.privacyLink) document.getElementById('privacy-link').href = data.privacyLink;
                if (data.copyright) document.getElementById('copyright').innerText = data.copyright;
                if (data.kofiText) document.getElementById('kofi-link').innerText = data.kofiText;
                if (data.modalTitle) document.getElementById('modal-title').innerText = data.modalTitle;
                if (data.modalBody) document.getElementById('modal-body').innerHTML = data.modalBody;
            }
        } catch (e) {}
    }

    init();
</script>

</body>
</html>
