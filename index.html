<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="apple-touch-icon" href="image_43.png">
    <link rel="icon" href="image_43.png">
    <title>Bracket Cleaner - Fridge Combo</title>
    <style>
        :root {
            --bg: #fff;
            --main: #333;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header { text-align: center; margin-bottom: 5px; }
        h1 { font-size: 26px; margin: 0; font-weight: 800; letter-spacing: -1px; }
        .description { font-size: 13px; opacity: 0.6; margin-top: 5px; }

        /* Mode Selector */
        .mode-selector {
            display: flex;
            background: var(--input-bg);
            padding: 5px;
            border-radius: var(--radius);
            border: 1px solid var(--accent);
            gap: 5px;
        }
        .mode-btn {
            flex: 1;
            padding: 10px;
            font-size: 12px;
            font-weight: 800;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: var(--main);
            cursor: pointer;
            opacity: 0.4;
            transition: 0.2s;
        }
        .mode-btn.active {
            background: var(--main);
            color: #fff;
            opacity: 1;
        }

        .input-wrapper {
            width: 100%;
            position: relative;
        }

        textarea {
            width: 100%;
            height: 320px;
            padding: 15px;
            border: 2px solid var(--accent);
            border-radius: var(--radius);
            background-color: var(--input-bg);
            font-size: 16px;
            color: var(--main);
            outline: none;
            resize: none;
            /* iOS Safari Fix */
            -webkit-appearance: none;
            -webkit-text-fill-color: var(--main);
            opacity: 1 !important;
        }

        .clr-btn {
            position: absolute;
            right: 15px;
            bottom: 15px;
            font-size: 12px;
            font-weight: 800;
            color: var(--main);
            cursor: pointer;
            opacity: 0.4;
            padding: 5px;
        }

        .action-btn {
            width: 100%;
            padding: 18px;
            background-color: var(--main);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
        }
        .action-btn:active { transform: scale(0.98); }

        .stats-area {
            display: none;
            background: var(--input-bg);
            border-radius: var(--radius);
            padding: 20px;
            border: 1px solid var(--accent);
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .stats-title { font-size: 13px; font-weight: 800; margin-bottom: 10px; }
        .stat-item {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            padding: 5px 0;
            border-bottom: 1px solid #eee;
        }

        .copy-btn {
            display: none;
            width: 100%;
            padding: 18px;
            background-color: var(--main);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
        }

        .support-area {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            border-top: 1px solid var(--accent);
            padding-top: 25px;
        }

        .foot-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--main);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
        }

        footer {
            margin-top: auto;
            padding: 40px 0 20px;
            text-align: center;
            font-size: 11px;
            line-height: 1.8;
            opacity: 0.4;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center; align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #fff;
            padding: 30px;
            border-radius: var(--radius);
            max-width: 340px;
            width: 90%;
            position: relative;
        }
        .modal-close { position: absolute; top: 15px; right: 15px; font-size: 22px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Bracket Cleaner</h1>
        <div class="description">Remove brackets or their content.</div>
    </header>

    <div class="mode-selector">
        <button id="mode-content" class="mode-btn active">Remove Content</button>
        <button id="mode-brackets" class="mode-btn">Remove Brackets Only</button>
    </div>

    <div class="input-wrapper">
        <textarea id="text-input" placeholder="Paste your text here..."></textarea>
        <div class="clr-btn" id="clr-action">CLR</div>
    </div>

    <button id="clean-btn" class="action-btn">CLEAN BRACKETS</button>

    <div id="stats-area" class="stats-area">
        <div class="stats-title">✨ Cleaned!</div>
        <div id="stats-list"></div>
        <button id="copy-btn" class="copy-btn">COPY TEXT</button>
    </div>

    <div class="support-area">
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="foot-btn">☕️buy me a coffee</a>
        <div class="foot-btn" onclick="showModal()">📱 Add to Home Screen</div>
    </div>
</div>

<footer>
    No login / No tracking / No ads / Browser only<br>
    Privacy Policy / afrorakda © 2026
</footer>

<div id="homeModal" class="modal">
    <div class="modal-content">
        <div class="modal-close" onclick="closeModal()">×</div>
        <h3>Install</h3>
        <p><b>🍏 iPhone:</b> Share > Add to Home Screen</p>
        <p><b>🤖 Android:</b> Menu > Add to Home Screen</p>
    </div>
</div>

<script>
    const input = document.getElementById('text-input');
    const clrBtn = document.getElementById('clr-action');
    const cleanBtn = document.getElementById('clean-btn');
    const statsArea = document.getElementById('stats-area');
    const statsList = document.getElementById('stats-list');
    const copyBtn = document.getElementById('copy-btn');
    
    let currentMode = 'content'; // 'content' or 'brackets'

    // Mode Selection
    document.getElementById('mode-content').addEventListener('click', (e) => {
        currentMode = 'content';
        e.target.classList.add('active');
        document.getElementById('mode-brackets').classList.remove('active');
    });

    document.getElementById('mode-brackets').addEventListener('click', (e) => {
        currentMode = 'brackets';
        e.target.classList.add('active');
        document.getElementById('mode-content').classList.remove('active');
    });

    // CLR Action
    clrBtn.addEventListener('click', () => {
        input.value = '';
        statsArea.style.display = 'none';
        copyBtn.style.display = 'none';
        input.focus();
    });

    // Clean Logic
    cleanBtn.addEventListener('click', () => {
        const original = input.value;
        if (!original) return;

        // Regular Expressions for various brackets
        // ( ) [ ] { } 「 」 『 』 < > 〈 〉 《 》 ＜ ＞ ［ ］ ｛ ｝ （ ）
        const regexes = [
            /\(.*?\)/g, /（.*?）/g,
            /\[.*?\]/g, /［.*?］/g,
            /\{.*?\}/g, /｛.*?｝/g,
            /「.*?」/g, /『.*?』/g,
            /<.*?>/g, /〈.*?〉/g, /《.*?》/g, /＜.*?＞/g
        ];

        let cleaned = original;
        
        if (currentMode === 'content') {
            // Remove everything including brackets
            regexes.forEach(re => {
                cleaned = cleaned.replace(re, '');
            });
        } else {
            // Remove only brackets, keep content
            // Using a specific regex for each bracket type to preserve inner text
            const bracketPairs = [
                ['\\(', '\\)'], ['（', '）'],
                ['\\[', '\\]'], ['［', '］'],
                ['\\{', '\\}'], ['｛', '｝'],
                ['「', '」'], ['『', '』'],
                ['<', '>'], ['〈', '〉'], ['《', '》'], ['＜', '＞']
            ];
            
            bracketPairs.forEach(pair => {
                const reOpen = new RegExp(pair[0], 'g');
                const reClose = new RegExp(pair[1], 'g');
                cleaned = cleaned.replace(reOpen, '').replace(reClose, '');
            });
        }

        const charDiff = original.length - cleaned.length;
        input.value = cleaned;

        // Show stats
        statsList.innerHTML = `
            <div class="stat-item"><span>Original:</span><span>${original.length} chars</span></div>
            <div class="stat-item"><span>Cleaned:</span><span>${cleaned.length} chars</span></div>
            <div class="stat-item"><span>Removed:</span><span>${charDiff} chars</span></div>
        `;
        statsArea.style.display = 'block';
        copyBtn.style.display = 'block';
    });

    copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(input.value);
        const originalText = copyBtn.innerText;
        copyBtn.innerText = '✅ COPIED!';
        setTimeout(() => copyBtn.innerText = originalText, 2000);
    });

    function showModal() { document.getElementById('homeModal').style.display = 'flex'; }
    function closeModal() { document.getElementById('homeModal').style.display = 'none'; }
</script>

</body>
</html>
