<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bracket Cleaner - Fridge Combo</title>
    <style>
        :root {
            --bg: #fff;
            --main: #333;
            --accent: #eee;
            --input-bg: #fafafa;
            --radius: 15px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header { text-align: left; padding: 0 10px; }
        h1 { font-size: 26px; margin: 0; font-weight: 800; letter-spacing: -1px; }
        .description { font-size: 13px; opacity: 0.6; margin-top: 5px; }

        .mode-selector {
            display: flex;
            background: var(--input-bg);
            padding: 5px;
            border-radius: var(--radius);
            border: 1px solid var(--accent);
            gap: 5px;
        }
        .mode-btn {
            flex: 1;
            padding: 12px;
            font-size: 12px;
            font-weight: 800;
            border: none;
            border-radius: 10px;
            background: transparent;
            color: var(--main);
            cursor: pointer;
            transition: 0.2s;
        }
        .mode-btn.active {
            background: var(--main);
            color: #fff;
        }

        .input-wrapper {
            width: 100%;
            position: relative;
        }

        textarea {
            width: 100%;
            height: 300px;
            padding: 15px;
            border: 2px solid var(--accent);
            border-radius: var(--radius);
            background-color: var(--input-bg);
            font-size: 16px;
            color: var(--main);
            outline: none;
            resize: none;
            -webkit-appearance: none;
            -webkit-text-fill-color: var(--main);
            opacity: 1 !important;
        }

        .clr-btn {
            position: absolute;
            right: 15px;
            bottom: 15px;
            font-size: 12px;
            font-weight: 800;
            color: var(--main);
            cursor: pointer;
            opacity: 0.4;
            padding: 10px;
        }

        .action-btn {
            width: 100%;
            padding: 20px;
            background-color: var(--main);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
        }

        .result-area {
            display: none;
            background: var(--input-bg);
            border-radius: var(--radius);
            padding: 15px;
            border: 1px solid var(--accent);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 5px;
            opacity: 0.7;
        }

        .copy-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--main);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
        }

        footer {
            margin-top: auto;
            padding: 40px 0 20px;
            text-align: center;
            font-size: 11px;
            line-height: 1.8;
            opacity: 0.4;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Bracket Cleaner</h1>
        <p class="description">Remove brackets or their content instantly.</p>
    </header>

    <div class="mode-selector">
        <button id="btn-content" class="mode-btn active">Delete Content</button>
        <button id="btn-bracket" class="mode-btn">Brackets Only</button>
    </div>

    <div class="input-wrapper">
        <textarea id="input-text" placeholder="Paste text here..."></textarea>
        <div class="clr-btn" id="btn-clr">CLR</div>
    </div>

    <button id="btn-main" class="action-btn">CLEAN TEXT</button>

    <div id="result-box" class="result-area">
        <div id="stats"></div>
        <button id="btn-copy" class="copy-btn">COPY RESULT</button>
    </div>
</div>

<footer>
    No login / No tracking / No ads / Browser only<br>
    Privacy Policy / afrorakda © 2026
</footer>

<script>
    const input = document.getElementById('input-text');
    const btnMain = document.getElementById('btn-main');
    const resultBox = document.getElementById('result-box');
    const stats = document.getElementById('stats');
    const btnCopy = document.getElementById('btn-copy');
    let mode = 'content';

    document.getElementById('btn-content').onclick = (e) => {
        mode = 'content';
        e.target.classList.add('active');
        document.getElementById('btn-bracket').classList.remove('active');
    };
    document.getElementById('btn-bracket').onclick = (e) => {
        mode = 'bracket';
        e.target.classList.add('active');
        document.getElementById('btn-content').classList.remove('active');
    };

    document.getElementById('btn-clr').onclick = () => {
        input.value = '';
        resultBox.style.display = 'none';
        input.focus();
    };

    btnMain.onclick = () => {
        const original = input.value;
        if(!original) return;

        const pairs = [
            ['\\(', '\\)'], ['（', '）'], ['\\[', '\\]'], ['［', '］'],
            ['\\{', '\\}'], ['｛', '｝'], ['「', '」'], ['『', '』'],
            ['<', '>'], ['〈', '〉'], ['《', '》'], ['＜', '＞'], ['【', '】']
        ];

        let result = original;
        if (mode === 'content') {
            pairs.forEach(p => {
                const re = new RegExp(p[0] + '.*?' + p[1], 'g');
                result = result.replace(re, '');
            });
        } else {
            pairs.forEach(p => {
                const reOpen = new RegExp(p[0], 'g');
                const reClose = new RegExp(p[1], 'g');
                result = result.replace(reOpen, '').replace(reClose, '');
            });
        }

        input.value = result;
        stats.innerHTML = `
            <div class="stat-row"><span>Before:</span><span>${original.length} chars</span></div>
            <div class="stat-row"><span>After:</span><span>${result.length} chars</span></div>
        `;
        resultBox.style.display = 'block';
    };

    btnCopy.onclick = () => {
        navigator.clipboard.writeText(input.value);
        const oldText = btnCopy.innerText;
        btnCopy.innerText = '✅ COPIED';
        setTimeout(() => btnCopy.innerText = oldText, 2000);
    };
</script>

</body>
</html>
